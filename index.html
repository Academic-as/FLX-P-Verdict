<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLX-P | Verdict</title>
    <link rel="icon" type="image/png" href="flxp-icon.png">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-space: #05070a;
            --flxp-purple: #8a2be2;
            --flxp-cyan: #00f2ff;
            --card-inner: #0d1117;
        }

        body { 
            background-color: var(--dark-space); 
            color: white; 
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(138, 43, 226, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .flxp-gradient-text {
            background: linear-gradient(135deg, var(--flxp-purple) 0%, var(--flxp-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .glass-card { 
            background: var(--card-inner); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-field { 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(138, 43, 226, 0.3); 
            transition: all 0.3s ease;
        }
        .input-field:focus { 
            border-color: var(--flxp-cyan); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            outline: none;
        }

        .btn-flxp {
            background: linear-gradient(135deg, var(--flxp-purple) 0%, var(--flxp-cyan) 100%);
            color: white;
            font-weight: 800;
            transition: all 0.3s ease;
        }
        .btn-flxp:hover:not(:disabled) {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
        }
        .btn-flxp:disabled { opacity: 0.3; filter: grayscale(1); }

        .tab-active {
            border-bottom: 3px solid var(--flxp-cyan);
            color: var(--flxp-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .info-card {
            margin-top: 40px;
            background: linear-gradient(rgba(138, 43, 226, 0.05), rgba(0, 242, 255, 0.05));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }

        /* Стиль для контейнера иконки */
        .icon-container {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--flxp-purple);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }

        .icon-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const MAYAK_RULES = [
            { label: "Выберите нарушение из Маяка", value: "", time: "" },
            { label: "[1.3/1.4] Читы/Злостный багоюз/Рейд", value: "Читы/багоюз/рейд", time: "50y", global: true },
            { label: "[1.1] Иностранная речь", value: "Иностранная речь", time: "1y" },
            { label: "[1.2] Токсичное/Неадекватное поведение", value: "Токсичное поведение", time: "12h" },
            { label: "[1.3] MicSpam", value: "MicSpam", time: "4h" },
            { label: "[1.5] Обход наказания", value: "Обход наказания", time: "x2" },
            { label: "[1.7] Реклама ресурсов", value: "Реклама", time: "7d" },
            { label: "[2.1] RDM (Массовый)", value: "RDM", time: "3d" },
            { label: "[2.2] Free Damage", value: "FreeDamage", time: "2h" },
            { label: "[2.4] Leave RP / Уход от погони", value: "LeaveRP", time: "6h" },
            { label: "[2.8] NonRP / Нарушение логики", value: "NonRP", time: "3h" },
            { label: "[2.10] FearRP", value: "FearRP", time: "2h" }
        ];

        const App = () => {
            const [mode, setMode] = useState('ban');
            const [form, setForm] = useState({ steamId: '', duration: '', reason: '', extra: '', globalFlag: false });
            const [copied, setCopied] = useState(false);

            const handleTemplateChange = (e) => {
                const selected = MAYAK_RULES.find(r => r.label === e.target.value);
                if (selected) {
                    setForm(prev => ({ ...prev, reason: selected.value, duration: selected.time, globalFlag: selected.global || false }));
                }
            };

            const generatedCommand = useMemo(() => {
                const { steamId, duration, reason, extra, globalFlag } = form;
                const sID = steamId || '[SteamID]';
                const res = reason || '[Причина]';
                const ext = extra ? ` ${extra}` : '';
                if (mode === 'ban') {
                    const dur = duration || '[Время]';
                    const flag = globalFlag ? ' -g' : '';
                    return `ban ${sID} ${dur} ${res}${ext}${flag}`;
                } else {
                    return `warn ${sID} ${res}${ext}`;
                }
            }, [form, mode]);

            const copyToClipboard = () => {
                if (!form.steamId) return;
                navigator.clipboard.writeText(generatedCommand);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-12 flex flex-col items-center">
                    <header className="mb-10 text-center">
                        <div className="flex items-center justify-center gap-4 mb-2">
                            {/* СЮДА ВСТАВЬТЕ ССЫЛКУ НА ВАШУ КАРТИНКУ В src */}
                            <div className="icon-container">
                                <img src="flxp-icon.png" alt="FLXP Logo" />
                            </div>
                            <h1 className="text-4xl font-black tracking-tighter uppercase flxp-gradient-text">FLX-P | Verdict</h1>
                        </div>
                        <p className="text-slate-500 text-[10px] uppercase tracking-[0.5em]">Инструмент администрирования</p>
                    </header>

                    <div className="w-full max-w-4xl glass-card rounded-[2rem] overflow-hidden p-8 md:p-12">
                        <div className="flex gap-8 mb-10 border-b border-white/5">
                            <button onClick={() => setMode('ban')} className={`pb-4 px-2 font-black tracking-widest transition-all ${mode === 'ban' ? 'tab-active' : 'text-slate-600'}`}>BAN</button>
                            <button onClick={() => setMode('warn')} className={`pb-4 px-2 font-black tracking-widest transition-all ${mode === 'warn' ? 'tab-active' : 'text-slate-600'}`}>WARN</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">SteamID Игрока</label>
                                    <input value={form.steamId} onChange={e => setForm({...form, steamId: e.target.value})} placeholder="Ведите SteamID" className="w-full p-4 mt-2 rounded-xl input-field text-white font-mono" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Пункт Маяка</label>
                                    <select onChange={handleTemplateChange} className="w-full p-4 mt-2 rounded-xl input-field text-white appearance-none cursor-pointer">
                                        {MAYAK_RULES.map(r => <option key={r.label} value={r.label}>{r.label}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="space-y-6">
                                {mode === 'ban' && (
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Длительность</label>
                                        <input value={form.duration} onChange={e => setForm({...form, duration: e.target.value})} placeholder="50y / 3d" className="w-full p-4 mt-2 rounded-xl input-field text-white font-mono" />
                                    </div>
                                )}
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Дополнительно</label>
                                    <input value={form.extra} onChange={e => setForm({...form, extra: e.target.value})} placeholder="Пояснение..." className="w-full p-4 mt-2 rounded-xl input-field text-white" />
                                </div>
                            </div>
                        </div>

                        {mode === 'ban' && (
                            <div className="mt-8">
                                <label className="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" checked={form.globalFlag} onChange={e => setForm({...form, globalFlag: e.target.checked})} className="sr-only peer" />
                                    <div className="w-11 h-6 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                                    <span className="ml-3 text-xs font-bold text-purple-400 uppercase">Глобальный бан (-g)</span>
                                </label>
                            </div>
                        )}

                        <div className="mt-12 pt-8 border-t border-white/5">
                            <div className="bg-black/50 p-6 rounded-2xl border-2 border-dashed border-slate-800 text-center mb-6 font-mono text-white text-xl">
                                {generatedCommand}
                            </div>
                            <button onClick={copyToClipboard} disabled={!form.steamId} className="w-full py-5 rounded-2xl btn-flxp uppercase tracking-[0.2em] text-sm">
                                {copied ? "Скопировано!" : "Скопировать команду"}
                            </button>
                        </div>
                    </div>

                    <div className="w-full max-w-4xl">
                        <div className="info-card">
                            <h2 className="flxp-gradient-text uppercase text-xs tracking-widest mb-2">Данное приложение не является официальным продуктом FLX-project</h2>
                            <p className="text-slate-400 text-xs">
                                Оно было создано сторонним разработчиком <a className="text-cyan-400 font-bold no-underline hover:underline" href="https://discord.com/users/534028333982285842" target="_blank" rel="noopener noreferrer">Academic (@academic_as)</a> специально для FLX-project.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
