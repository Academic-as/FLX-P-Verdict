<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLX-P | Verdict</title>
    <link rel="icon" type="image/png" href="flxp-icon.png">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --dark-space: #05070a; --flxp-purple: #8a2be2; --flxp-cyan: #00f2ff; --card-inner: #0d1117; }
        body { background-color: var(--dark-space); color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 10% 10%, rgba(138, 43, 226, 0.1) 0%, transparent 40%), radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.05) 0%, transparent 40%); background-attachment: fixed; }
        .flxp-gradient-text { background: linear-gradient(135deg, var(--flxp-purple) 0%, var(--flxp-cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .glass-card { background: var(--card-inner); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-field { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(138, 43, 226, 0.3); transition: all 0.3s ease; color: white; }
        .input-field:focus { border-color: var(--flxp-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); outline: none; }
        .btn-flxp { background: linear-gradient(135deg, var(--flxp-purple) 0%, var(--flxp-cyan) 100%); color: white; font-weight: 800; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.1em; }
        .btn-flxp:hover:not(:disabled) { filter: brightness(1.2); box-shadow: 0 0 25px rgba(0, 242, 255, 0.4); transform: translateY(-1px); }
        .btn-flxp:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .tab-active { border-bottom: 3px solid var(--flxp-cyan); color: var(--flxp-cyan); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .info-card { margin-top: 40px; background: linear-gradient(rgba(138, 43, 226, 0.05), rgba(0, 242, 255, 0.05)); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; text-align: center; }
        .icon-container { width: 48px; height: 48px; border-radius: 12px; overflow: hidden; border: 2px solid var(--flxp-purple); box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); display: flex; align-items: center; justify-content: center; background: black; }
        .icon-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Анимация появления для встроенного уведомления */
        .notification-fade-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [mode, setMode] = useState('ban');
            const [subMode, setSubMode] = useState('ban');
            const [form, setForm] = useState({ 
                id: '', 
                durationValue: '', 
                durationUnit: 'h', 
                reason: '', 
                editField: 'r', 
                editValue: '', 
                globalFlag: false,
                recidivMult: '2'
            });
            const [recidivEnabled, setRecidivEnabled] = useState(false);
            const [copied, setCopied] = useState(false);
            const [showNotice, setShowNotice] = useState(false);

            const descriptions = {
                ban: { title: "Ограничение доступа к серверу", text: "Полное ограничение доступа к серверу. Выберите срок или укажите 50y для перманентного бана.", icon: "fa-gavel" },
                warn: { title: "Система предупреждений", text: "Официальный варн за мелкие нарушения.", icon: "fa-exclamation-triangle" },
                rp: { title: "Аннулирование наказания", text: "Revoke Punishment - снятие ошибочного или амнистированного наказания по его ID.", icon: "fa-undo" },
                ep: { title: "Редактирование вердикта", text: "Edit Punishment - изменение параметров (причины, срока, IP) уже выданного наказания.", icon: "fa-edit" }
            };

            // Проверяем, нужно ли показывать уведомление о годах
            useEffect(() => {
                if (mode === 'ban' && form.durationUnit === 'y' && form.durationValue) {
                    setShowNotice(true);
                } else {
                    setShowNotice(false);
                }
            }, [form.durationUnit, form.durationValue, mode]);

            const generatedCommand = useMemo(() => {
                const { id, durationValue, durationUnit, reason, editField, editValue, globalFlag, recidivMult } = form;
                const targetID = id || '[ID/SteamID]';
                const res = reason || '[Причина]';
                
                if (mode === 'ban' || mode === 'warn') {
                    const isBanRecidiv = mode === 'ban' && recidivEnabled;
                    const recidivText = isBanRecidiv ? ` + рецидив x${recidivMult}` : "";
                    
                    let finalDuration = '[Время]';
                    
                    if (durationValue) {
                        let val = parseInt(durationValue);
                        if (!isNaN(val)) {
                            let unit = durationUnit;
                            
                            if (unit === 'y') {
                                val = val * 365;
                                unit = 'd';
                            }

                            if (form.durationValue === '50' && form.durationUnit === 'y') {
                                finalDuration = '18250d';
                            } else if (isBanRecidiv) {
                                finalDuration = (val * parseInt(recidivMult)) + unit;
                            } else {
                                finalDuration = val + unit;
                            }
                        }
                    }
                    
                    if (mode === 'ban') {
                        return `ban ${targetID} ${finalDuration} ${res}${recidivText}${globalFlag ? ' -g' : ''}`;
                    }
                    return `warn ${targetID} ${res}`;
                }

                if (mode === 'rp') return `revokepunishment ${subMode} ${targetID} ${res}`;
                if (mode === 'ep') return `editpunishment ${subMode} ${targetID} ${editField} ${editValue || '[Значение]'}`;

                return "";
            }, [form, mode, subMode, recidivEnabled]);

            return (
                <div className="min-h-screen p-4 md:p-12 flex flex-col items-center">
                    <header className="mb-10 text-center">
                        <div className="flex items-center justify-center gap-4 mb-2">
                            <div className="icon-container"><img src="flxp-icon.png" alt="Logo" /></div>
                            <h1 className="text-4xl font-black tracking-tighter uppercase flxp-gradient-text">FLX-P | Verdict</h1>
                        </div>
                        <p className="text-slate-500 text-[10px] uppercase tracking-[0.5em]">Инструмент администрирования</p>
                    </header>

                    <div className="w-full max-w-4xl glass-card rounded-[2rem] overflow-hidden p-8 md:p-12">
                        <div className="flex gap-8 mb-6 border-b border-white/5">
                            {['ban', 'warn', 'rp', 'ep'].map(m => (
                                <button key={m} onClick={() => setMode(m)} className={`pb-4 px-2 font-black tracking-widest transition-all uppercase ${mode === m ? 'tab-active' : 'text-slate-600'}`}>{m}</button>
                            ))}
                        </div>

                        <div className="mb-10 p-6 bg-gradient-to-r from-white/5 to-transparent rounded-2xl border border-white/10 flex items-start gap-4">
                            <div className="text-cyan-400 text-2xl mt-1"><i className={`fas ${descriptions[mode].icon}`}></i></div>
                            <div>
                                <h3 className="text-sm font-black uppercase tracking-widest text-white mb-1">{descriptions[mode].title}</h3>
                                <p className="text-sm text-slate-400 leading-relaxed font-medium">{descriptions[mode].text}</p>
                            </div>
                        </div>

                        {/* Сетка полей ввода */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 items-end">
                            <div className="md:col-span-2 space-y-2">
                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">{(mode === 'rp' || mode === 'ep') ? `ID ${subMode === 'ban' ? 'бана' : 'варна'}` : 'SteamID'}</label>
                                <input value={form.id} onChange={e => setForm({...form, id: e.target.value})} placeholder="Ввод..." className="w-full p-4 rounded-xl input-field font-mono" />
                            </div>

                            {mode === 'ban' && (
                                <div className="md:col-span-2 space-y-2">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Длительность</label>
                                    <div className="flex gap-2">
                                        <input type="number" min="1" value={form.durationValue} onChange={e => setForm({...form, durationValue: e.target.value})} placeholder="Число" className="w-2/3 p-4 rounded-xl input-field font-mono" />
                                        <select value={form.durationUnit} onChange={e => setForm({...form, durationUnit: e.target.value})} className="w-1/3 p-4 rounded-xl input-field appearance-none cursor-pointer text-xs font-bold uppercase text-center">
                                            <option value="m">m (мин)</option>
                                            <option value="h">h (час)</option>
                                            <option value="d">d (день)</option>
                                            <option value="y">y (год)</option>
                                        </select>
                                    </div>
                                </div>
                            )}

                            {mode === 'ep' && (
                                <>
                                    <div className="md:col-span-1 space-y-2">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Поле</label>
                                        <select value={form.editField} onChange={e => setForm({...form, editField: e.target.value})} className="w-full p-4 rounded-xl input-field appearance-none cursor-pointer text-xs font-bold uppercase">
                                            <option value="r">Причина</option>
                                            <option value="d">Срок</option>
                                            <option value="a">IP бан</option>
                                        </select>
                                    </div>
                                    <div className="md:col-span-1 space-y-2">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Значение</label>
                                        <input value={form.editValue} onChange={e => setForm({...form, editValue: e.target.value})} placeholder="..." className="w-full p-4 rounded-xl input-field" />
                                    </div>
                                </>
                            )}

                            {(mode === 'warn' || mode === 'rp') && (
                                <div className="md:col-span-2 space-y-2">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Причина</label>
                                    <input value={form.reason} onChange={e => setForm({...form, reason: e.target.value})} placeholder="..." className="w-full p-4 rounded-xl input-field" />
                                </div>
                            )}
                        </div>

                        {(mode === 'rp' || mode === 'ep') && (
                            <div className="flex gap-4 p-1.5 bg-black/40 rounded-xl border border-white/5 w-full md:w-1/2 mb-8">
                                <button onClick={() => setSubMode('ban')} className={`flex-1 py-2.5 rounded-lg text-[10px] font-black transition-all ${subMode === 'ban' ? 'bg-purple-600 text-white shadow-lg shadow-purple-900/40' : 'text-slate-500'}`}>BAN MODE</button>
                                <button onClick={() => setSubMode('warn')} className={`flex-1 py-2.5 rounded-lg text-[10px] font-black transition-all ${subMode === 'warn' ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-900/40' : 'text-slate-500'}`}>WARN MODE</button>
                            </div>
                        )}

                        {mode === 'ban' && (
                            <div className="w-full mb-8 space-y-2">
                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Причины</label>
                                <textarea value={form.reason} onChange={e => setForm({...form, reason: e.target.value})} placeholder="Укажите подробную причину нарушения..." className="w-full p-4 rounded-xl input-field resize-none h-24" />
                            </div>
                        )}

                        {mode === 'ban' && (
                            <div className="flex flex-wrap gap-8 items-center pt-2">
                                <label className="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" checked={form.globalFlag} onChange={e => setForm({...form, globalFlag: e.target.checked})} className="sr-only peer" />
                                    <div className="w-11 h-6 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-purple-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                                    <span className="ml-3 text-[10px] font-bold text-purple-400 uppercase tracking-widest">Global (-g)</span>
                                </label>
                                <div className="flex items-center gap-4">
                                    <label className="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" checked={recidivEnabled} onChange={e => setRecidivEnabled(e.target.checked)} className="sr-only peer" />
                                        <div className="w-11 h-6 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-cyan-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                                        <span className="ml-3 text-[10px] font-bold text-cyan-400 uppercase tracking-widest mr-2">Рецидив</span>
                                    </label>
                                    {recidivEnabled && (
                                        <select value={form.recidivMult} onChange={e => setForm({...form, recidivMult: e.target.value})} className="bg-black/40 border border-cyan-500/30 rounded-lg px-2 py-1 text-cyan-400 text-[10px] font-bold outline-none">
                                            <option value="2">x2</option><option value="3">x3</option><option value="4">x4</option><option value="5">x5</option><option value="6">x6</option><option value="7">x7</option>
                                        </select>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Зона вывода готового вердикта */}
                        <div className="mt-12 pt-8 border-t border-white/5">
                            
                            {/* Новое место для уведомления о баге (над кодом команды) */}
                            {showNotice && (
                                <div className="mb-4 bg-amber-950/40 border border-amber-500/40 text-amber-200 px-5 py-3.5 rounded-xl flex items-center gap-4 notification-fade-in">
                                    <div className="text-amber-400 text-lg"><i className="fas fa-exclamation-circle"></i></div>
                                    <div className="text-xs font-medium leading-relaxed">
                                        <span className="font-black uppercase tracking-wider block text-amber-400 mb-0.5">Внимание!</span>
                                        Символ <span className="font-mono bg-black/60 px-1 py-0.5 rounded border border-amber-500/30 text-white font-bold">y</span> сейчас не принимается системой. Срок автоматически переведён в <span className="font-bold text-white">дни (d)</span> (1г = 365д).
                                    </div>
                                </div>
                            )}

                            <div className="bg-black/50 p-6 rounded-2xl border-2 border-dashed border-slate-800 text-center mb-6 font-mono text-white text-lg break-all">
                                {generatedCommand}
                            </div>
                            <button onClick={() => { navigator.clipboard.writeText(generatedCommand); setCopied(true); setTimeout(() => setCopied(false), 2000); }} disabled={!form.id} className="w-full py-5 rounded-2xl btn-flxp text-sm tracking-[0.15em]">
                                {copied ? "Готово!" : "Копировать вердикт"}
                            </button>
                        </div>
                    </div>

                    <div className="w-full max-w-4xl info-card">
                        <h2 className="flxp-gradient-text uppercase text-xs tracking-widest mb-2">Данное приложение не является официальным продуктом FLX-project</h2>
                        <p className="text-slate-400 text-xs">
                            Оно было создано сторонним разработчиком <a className="text-cyan-400 font-bold no-underline hover:underline" href="https://discord.com/users/534028333982285842" target="_blank" rel="noopener noreferrer">Academic (@academic_as)</a> специально для FLX-project.
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
